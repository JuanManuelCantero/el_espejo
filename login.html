<!DOCTYPE html>
<html lang="es-AR">
<head>

  <!-- ** Basic Page Needs ** -->
  <meta charset="utf-8">
  <title>Login - El Espejo | Espacio Psicoterapéutico</title>
  <!-- Css fuentes -->
  <link rel="stylesheet" href="css/fonts.css">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet">

  <!-- ** SEO & Meta ** -->
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="description" content="Acceso para profesionales - El Espejo Espacio Psicoterapéutico">
  <meta name="keywords" content="login, profesionales, El Espejo">
  <meta name="robots" content="noindex, nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <meta name="author" content="El Espejo - Espacio Psicoterapéutico">
  <meta name="theme-color" content="#3a7ca5">

  <!-- ** Plugins Needed for the Project ** -->
  <!-- bootstrap -->
  <link rel="stylesheet" href="plugins/bootstrap/bootstrap.min.css">
  <!-- fontawesome -->
  <link rel="stylesheet" href="plugins/fontawesome/css/all.min.css">
  <!-- animate.css -->
  <link rel="stylesheet" href="plugins/animation/animate.min.css">
  <!-- Google Fonts-->
  <link rel="preconnect" href="https://fonts.gstatic.com">
  <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">	
  <!-- Stylesheets -->
  <link href="css/style.css" rel="stylesheet">
  <!--Favicon-->
  <link rel="icon" href="images/favicon.png" type="image/x-icon">

  <style>
    body {
      background: #f2f6fb;
      color: #1f2d3d;
      font-family: 'Work Sans', sans-serif;
    }
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px 20px;
    }
    .login-card {
      width: 100%;
      max-width: 1100px;
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      background: #ffffff;
      border-radius: 30px;
      overflow: hidden;
      box-shadow: 0 40px 90px rgba(31, 45, 64, 0.14);
    }
    .login-image {
      position: relative;
      background: linear-gradient(180deg, rgba(53, 131, 196, 0.92), rgba(242, 137, 21, 0.72)),
        url('images/slider/fachada/fachada1.jpeg');
      background-size: cover;
      background-position: center right;
      min-height: 600px;
    }
    .login-image::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(53, 131, 196, 0.55), rgba(242, 137, 21, 0.55));
    }
    .login-image-caption {
      position: absolute;
      left: 40px;
      bottom: 40px;
      color: #ffffff;
      z-index: 2;
      max-width: 300px;
    }
    .login-image-caption h3 {
      margin: 0 0 12px;
      font-size: 28px;
      line-height: 1.15;
      letter-spacing: 0.02em;
      color: #ffffff;
    }
    .login-image-caption p {
      margin: 0;
      font-size: 15px;
      line-height: 1.8;
      color: rgba(255,255,255,0.95);
    }
    .login-panel {
      padding: 60px 50px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      background: #ffffff;
    }
    .login-brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      margin-bottom: 45px;
      text-align: center;
      padding-top: 10px;
    }
    .login-brand img {
      width: 192px;
      height: auto;
    }
    .login-brand h1 {
      font-size: 40px;
      margin: 0;
      font-family: 'Dancing Script', cursive;
      letter-spacing: 0.03em;
    }
    .login-title {
      font-size: 28px;
      margin: 0 0 12px;
      letter-spacing: 0.03em;
      color: #17283b;
    }
    .login-subtitle {
      color: #62768b;
      margin-bottom: 32px;
      line-height: 1.8;
      max-width: 420px;
    }
    .login-form {
      width: 100%;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      margin-bottom: 10px;
      color: #4b5d70;
      font-weight: 600;
    }
    .form-control {
      width: 100%;
      padding: 16px 18px;
      border: 1px solid #d5dee8;
      border-radius: 14px;
      font-size: 15px;
      background: #f8fbff;
      color: #1f2d3d;
      box-shadow: none;
    }
    .form-control:focus {
      outline: none;
      border-color: #3583C4;
      box-shadow: 0 0 0 4px rgba(53, 131, 196, 0.18);
    }
    .btn-login {
      width: 100%;
      padding: 16px;
      border-radius: 14px;
      border: none;
      background: #F28915;
      color: #ffffff;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.02em;
      transition: background 0.25s ease;
      box-shadow: 0 12px 25px rgba(242, 137, 21, 0.25);
    }
    .btn-login:hover {
      background: #d97712;
    }
    .form-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 18px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .footer-links {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }
    .footer-links a {
      color: #3583C4;
      text-decoration: none;
      font-size: 14px;
    }
    .footer-links a:hover {
      text-decoration: underline;
    }
    .btn-outline-primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 18px;
      border-radius: 14px;
      border: 1px solid #3583C4;
      background: transparent;
      color: #3583C4;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      transition: background 0.25s ease, color 0.25s ease;
    }
    .btn-outline-primary:hover {
      background: rgba(53, 131, 196, 0.1);
      color: #214f73;
      text-decoration: none;
    }
    .signup-note {
      margin-top: 35px;
      font-size: 14px;
      color: #6b7c8e;
    }
    .signup-note a {
      color: #3583C4;
      font-weight: 700;
      text-decoration: none;
    }
    .signup-note a:hover {
      text-decoration: underline;
    }
    .error-message {
      margin-top: 16px;
      min-height: 22px;
      color: #d64541;
      font-weight: 600;
    }
    @media (max-width: 991px) {
      .login-card {
        grid-template-columns: 1fr;
      }
      .login-image {
        min-height: 300px;
      }
      .login-image-caption {
        left: 24px;
        bottom: 24px;
        max-width: 100%;
      }
      .login-panel {
        padding: 40px 28px;
      }
    }
    @media (max-width: 575px) {
      .login-page {
        padding: 20px 12px;
      }
      .login-panel {
        padding: 30px 20px;
      }
      .login-title {
        font-size: 24px;
      }
      .login-brand h1 {
        font-size: 28px;
      }
    }
  </style>
</head>

<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-image">
        <div class="login-image-caption">
          <h3>Acceso profesional</h3>
          <p>Un espacio de inicio de sesión tranquilo, limpio y alineado al concepto visual de El Espejo.</p>
        </div>
      </div>
      <div class="login-panel">
        <div class="login-brand">
          <img src="images/logo/EL_ESPEJO_ISOLOGO_H_320px.png" alt="El Espejo logo">
          <h1>Acceso de Usuario</h1>
        </div>
        <p class="login-subtitle">Ingresá tus datos para gestionar tu agenda y administrar turnos desde un acceso profesional.</p>
        <form action="#" method="post" id="loginForm" class="login-form">
          <div class="form-group">
            <label for="username">Usuario</label>
            <input type="text" class="form-control" id="username" name="username" placeholder="Ingrese usuario" required>
          </div>
          <div class="form-group">
            <label for="password">Contraseña</label>
            <input type="password" class="form-control" id="password" name="password" placeholder="Ingrese su contraseña" required>
          </div>
          <button type="submit" class="btn btn-login">Ingresar</button>
          <div id="errorMessage" class="error-message"></div>
          <div class="form-footer">
            <div class="footer-links">
              <a href="javascript:void(0);" onclick="openForgotModal()">Olvidé usuario / contraseña?</a>
              <a href="javascript:void(0);" class="btn-outline-primary" onclick="openSignupModal()">Crear cuenta</a>
            </div>
          </div>
        </form>
        <div class="signup-note">¿No tenés cuenta? <a href="javascript:void(0);" onclick="openSignupModal()">Crear cuenta</a></div>
      </div>
    </div>
  </div>

  <!-- jQuery -->
  <script src="plugins/jquery.min.js"></script>
  <!-- Bootstrap JS -->
  <script src="plugins/bootstrap/bootstrap.min.js"></script>
  <script>
    const ADMIN_PASSWORD = 'admin123';
    const defaultUsers = {
      'juan': { password: 'pass123' },
      'maria': { password: 'pass123' },
      'ana': { password: 'pass123' }
    };

    function loadUsers() {
      const stored = localStorage.getItem('loginUsers');
      return stored ? JSON.parse(stored) : { ...defaultUsers };
    }

    function saveUsers(users) {
      localStorage.setItem('loginUsers', JSON.stringify(users));
    }

    let users = loadUsers();

    function openSignupModal() {
      const modalHtml = `
        <div class="modal fade" id="signupModal" tabindex="-1" role="dialog" aria-hidden="true">
          <div class="modal-dialog modal-dialog-centered" role="document">
            <div class="modal-content">
              <div class="modal-header">
                <h5 class="modal-title">Crear cuenta</h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Cerrar">
                  <span aria-hidden="true">&times;</span>
                </button>
              </div>
              <div class="modal-body">
                <form id="signupForm">
                  <div class="form-group">
                    <label for="newUsername">Usuario</label>
                    <input type="text" class="form-control" id="newUsername" placeholder="Usuario" required>
                  </div>
                  <div class="form-group">
                    <label for="newPassword">Contraseña</label>
                    <input type="password" class="form-control" id="newPassword" placeholder="Contraseña" required>
                  </div>
                  <div class="form-group">
                    <label for="confirmPassword">Confirmar contraseña</label>
                    <input type="password" class="form-control" id="confirmPassword" placeholder="Confirmar contraseña" required>
                  </div>
                  <div class="form-group">
                    <label for="adminPassword">Clave de administrador</label>
                    <input type="password" class="form-control" id="adminPassword" placeholder="Clave del admin" required>
                  </div>
                  <div id="signupError" class="error-message"></div>
                </form>
              </div>
              <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-login" onclick="createAccount()">Crear cuenta</button>
              </div>
            </div>
          </div>
        </div>
      `;
      document.body.insertAdjacentHTML('beforeend', modalHtml);
      $('#signupModal').modal('show').on('hidden.bs.modal', function () {
        this.remove();
      });
    }

    function openForgotModal() {
      const modalHtml = `
        <div class="modal fade" id="forgotModal" tabindex="-1" role="dialog" aria-hidden="true">
          <div class="modal-dialog modal-dialog-centered" role="document">
            <div class="modal-content">
              <div class="modal-header">
                <h5 class="modal-title">Olvidé usuario / contraseña</h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Cerrar">
                  <span aria-hidden="true">&times;</span>
                </button>
              </div>
              <div class="modal-body">
                <form id="forgotForm">
                  <div class="form-group">
                    <label for="recoverUsername">Ingrese su usuario</label>
                    <input type="text" class="form-control" id="recoverUsername" placeholder="Usuario" required>
                  </div>
                  <div class="form-group">
                    <label for="newRecoverPassword">Nueva contraseña</label>
                    <input type="password" class="form-control" id="newRecoverPassword" placeholder="Nueva contraseña" required>
                  </div>
                  <div class="form-group">
                    <label for="confirmRecoverPassword">Confirmar nueva contraseña</label>
                    <input type="password" class="form-control" id="confirmRecoverPassword" placeholder="Confirmar contraseña" required>
                  </div>
                  <div id="forgotError" class="error-message"></div>
                  <div id="forgotSuccess" style="color: #28a745; font-weight: 600; margin-top: 12px;"></div>
                </form>
              </div>
              <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-login" onclick="recoverPassword()">Restablecer</button>
              </div>
            </div>
          </div>
        </div>
      `;
      document.body.insertAdjacentHTML('beforeend', modalHtml);
      $('#forgotModal').modal('show').on('hidden.bs.modal', function () {
        this.remove();
      });
    }

    function createAccount() {
      const username = document.getElementById('newUsername').value.trim();
      const password = document.getElementById('newPassword').value.trim();
      const confirmPassword = document.getElementById('confirmPassword').value.trim();
      const error = document.getElementById('signupError');
      error.textContent = '';

      const adminPassword = document.getElementById('adminPassword').value.trim();
      if (!username || !password || !confirmPassword || !adminPassword) {
        error.textContent = 'Complete todos los campos, incluida la clave de admin.';
        return;
      }
      if (password !== confirmPassword) {
        error.textContent = 'Las contraseñas no coinciden.';
        return;
      }
      if (adminPassword !== ADMIN_PASSWORD) {
        error.textContent = 'Clave de administrador incorrecta.';
        return;
      }
      if (users[username]) {
        error.textContent = 'El usuario ya existe. Elegí otro nombre.';
        return;
      }

      users[username] = { password };
      saveUsers(users);
      $('#signupModal').modal('hide');
      document.getElementById('errorMessage').textContent = 'Cuenta creada. Ya podés iniciar sesión.';
    }

    function recoverPassword() {
      const username = document.getElementById('recoverUsername').value.trim();
      const password = document.getElementById('newRecoverPassword').value.trim();
      const confirmPassword = document.getElementById('confirmRecoverPassword').value.trim();
      const error = document.getElementById('forgotError');
      const success = document.getElementById('forgotSuccess');
      error.textContent = '';
      success.textContent = '';

      if (!username || !password || !confirmPassword) {
        error.textContent = 'Complete todos los campos.';
        return;
      }
      if (!users[username]) {
        error.textContent = 'El usuario no existe.';
        return;
      }
      if (password !== confirmPassword) {
        error.textContent = 'Las contraseñas no coinciden.';
        return;
      }

      users[username].password = password;
      saveUsers(users);
      success.textContent = 'Contraseña restablecida correctamente. Usá el nuevo acceso.';
      error.textContent = '';
    }

    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      const errorMessage = document.getElementById('errorMessage');
      errorMessage.textContent = '';

      if (!username || !password) {
        errorMessage.textContent = 'Ingrese usuario y contraseña.';
        return;
      }

      users = loadUsers();
      if (!users[username] || users[username].password !== password) {
        errorMessage.textContent = 'Usuario o contraseña incorrectos.';
        return;
      }

      localStorage.setItem('agendaUser', username);
      window.location.href = 'agenda.html?user=' + encodeURIComponent(username);
    });
  </script>

</body>
</html>
